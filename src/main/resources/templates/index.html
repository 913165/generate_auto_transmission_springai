<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Center Audio Generator</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<div class="container">
    <header>
        <h1>Call Center Audio Generator (Spring)</h1>
        <p>Generate call-center MP3 files line-by-line with OpenAI TTS and speaker voice overrides.</p>
    </header>

    <section class="panel">
        <h2>Generate one conversation</h2>
        <label class="conversation-picker">
            Select conversation
            <select id="conversationSelect">
                <option th:each="conversation : ${conversations}"
                        th:value="${conversation.id}"
                        th:text="${conversation.title}"></option>
            </select>
        </label>

        <div th:each="conversation : ${conversations}"
             class="conversation-card"
             th:attr="data-conversation-id=${conversation.id}">
            <h3 th:text="${conversation.title}"></h3>
            <p th:text="${conversation.description}"></p>

            <table>
                <thead>
                <tr>
                    <th>Speaker</th>
                    <th>Line</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="line : ${conversation.lines}">
                    <td th:text="${line.speaker}"></td>
                    <td th:text="${line.text}"></td>
                </tr>
                </tbody>
            </table>

            <form class="generate-form"
                  th:action="@{'/generate/' + ${conversation.id}}"
                  th:data-filename="${conversation.id + '.mp3'}">
                <label>
                    TTS model
                    <select name="model">
                        <option th:each="m : ${ttsModels}" th:value="${m}" th:text="${m}" th:selected="${m == defaultModel}"></option>
                    </select>
                </label>

                <div class="voice-grid">
                    <label th:each="entry : ${conversation.speakerDefaults().entrySet()}">
                        <span th:text="${entry.key}"></span>
                        <select th:name="${'voice_' + entry.key}">
                            <option th:each="voice : ${ttsVoices}"
                                    th:value="${voice}"
                                    th:text="${voice}"
                                    th:selected="${voice == entry.value}"></option>
                        </select>
                    </label>
                </div>

                <button type="submit">🎙️ Generate and download MP3</button>

                <div class="progress-wrap" aria-live="polite">
                    <div class="progress-track">
                        <div class="progress-bar"></div>
                    </div>
                    <p class="progress-text"></p>
                </div>

                <div class="result-area"></div>
            </form>
        </div>
    </section>
</div>

<script>
(function () {
    /* ── Conversation dropdown ─────────────────────────────── */
    const select = document.getElementById("conversationSelect");
    const cards  = document.querySelectorAll(".conversation-card");

    function applySelection() {
        const id = select.value;
        cards.forEach(c => c.classList.toggle("is-active", c.dataset.conversationId === id));
    }
    select.addEventListener("change", applySelection);
    applySelection();

    /* ── Progress helpers ─────────────────────────────────── */
    function showProgress(form, msg) {
        const wrap = form.querySelector(".progress-wrap");
        const bar  = form.querySelector(".progress-bar");
        const txt  = form.querySelector(".progress-text");
        wrap.classList.add("is-active");
        bar.classList.remove("progress-bar--done", "progress-bar--error");
        bar.style.width = "0%";
        txt.textContent = msg || "Generating audio… please wait.";
        return { wrap, bar, txt };
    }

    function animateIndeterminate(bar) {
        bar.classList.add("progress-bar--indeterminate");
    }

    function finishProgress(wrap, bar, txt, ok, filename) {
        bar.classList.remove("progress-bar--indeterminate");
        bar.style.width = "100%";
        bar.classList.add(ok ? "progress-bar--done" : "progress-bar--error");
        txt.textContent = ok
            ? "✅ Done! " + filename + " is downloading."
            : "❌ Generation failed. Please check your API key and try again.";
        if (!ok) {
            setTimeout(() => {
                wrap.classList.remove("is-active");
                bar.style.width = "0%";
                bar.classList.remove("progress-bar--error");
                txt.textContent = "";
            }, 4000);
        }
    }

    /* ── Form submit via Fetch ───────────────────────────── */
    document.querySelectorAll(".generate-form").forEach(form => {
        const btn = form.querySelector("button[type='submit']");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const action   = form.getAttribute("action");
            const filename = form.dataset.filename || "audio.mp3";
            const data     = new FormData(form);

            btn.disabled = true;
            const { wrap, bar, txt } = showProgress(form, "Generating audio… please wait.");
            animateIndeterminate(bar);

            try {
                const resp = await fetch(action, {
                    method: "POST",
                    body: new URLSearchParams(data)
                });

                if (!resp.ok) {
                    const errText = await resp.text();
                    console.error("Server error:", errText);
                    finishProgress(wrap, bar, txt, false, filename);
                    return;
                }

                // Parse filename from Content-Disposition header
                let dlName = filename;
                const cd = resp.headers.get("Content-Disposition");
                if (cd) {
                    // Try filename*=UTF-8''encoded-name first (RFC 5987)
                    const extMatch = cd.match(/filename\*\s*=\s*UTF-8''([^;\s]+)/i);
                    if (extMatch) {
                        dlName = decodeURIComponent(extMatch[1]);
                    } else {
                        // Fall back to plain filename="name" or filename=name
                        const plainMatch = cd.match(/filename\s*=\s*"?([^";\r\n]+)"?/i);
                        if (plainMatch) {
                            dlName = plainMatch[1].trim();
                        }
                    }
                }
                // Always ensure .mp3 extension
                if (!dlName.toLowerCase().endsWith(".mp3")) {
                    dlName = dlName.replace(/\.[^.]+$/, "") + ".mp3";
                }

                const blob = await resp.blob();
                const url  = URL.createObjectURL(blob);
                const a    = document.createElement("a");
                a.href     = url;
                a.download = dlName;
                document.body.appendChild(a);
                a.click();
                a.remove();
                setTimeout(() => URL.revokeObjectURL(url), 10000);

                finishProgress(wrap, bar, txt, true, dlName);
            } catch (err) {
                console.error("Fetch error:", err);
                finishProgress(wrap, bar, txt, false, filename);
            } finally {
                btn.disabled = false;
            }
        });
    });
})();
</script>
</body>
</html>
