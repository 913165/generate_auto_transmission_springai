<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Center Audio Generator</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<div class="container">
    <header>
        <h1>Call Center Audio Generator (Spring)</h1>
        <p>Generate call-center MP3 files line-by-line with OpenAI TTS and speaker voice overrides.</p>
    </header>

    <section class="panel">
        <h2>Generate all conversations</h2>
        <form method="post" th:action="@{/generate-all}">
            <label>
                TTS model
                <select name="model">
                    <option th:each="m : ${ttsModels}" th:value="${m}" th:text="${m}" th:selected="${m == defaultModel}"></option>
                </select>
            </label>

            <div th:each="conversation : ${conversations}" class="conversation-settings">
                <h3 th:text="${conversation.title}"></h3>
                <div class="voice-grid">
                    <label th:each="entry : ${conversation.speakerDefaults().entrySet()}">
                        <span th:text="${entry.key}"></span>
                        <select th:name="${'voice_' + conversation.id + '__' + entry.key}">
                            <option th:each="voice : ${ttsVoices}"
                                    th:value="${voice}"
                                    th:text="${voice}"
                                    th:selected="${voice == entry.value}"></option>
                        </select>
                    </label>
                </div>
            </div>

            <button type="submit">Download all as ZIP</button>
        </form>
    </section>

    <section class="panel" th:each="conversation : ${conversations}">
        <h2 th:text="${conversation.title}"></h2>
        <p th:text="${conversation.description}"></p>

        <table>
            <thead>
            <tr>
                <th>Speaker</th>
                <th>Line</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="line : ${conversation.lines}">
                <td th:text="${line.speaker}"></td>
                <td th:text="${line.text}"></td>
            </tr>
            </tbody>
        </table>

        <form method="post" th:action="@{'/generate/' + ${conversation.id}}">
            <label>
                TTS model
                <select name="model">
                    <option th:each="m : ${ttsModels}" th:value="${m}" th:text="${m}" th:selected="${m == defaultModel}"></option>
                </select>
            </label>

            <div class="voice-grid">
                <label th:each="entry : ${conversation.speakerDefaults().entrySet()}">
                    <span th:text="${entry.key}"></span>
                    <select th:name="${'voice_' + entry.key}">
                        <option th:each="voice : ${ttsVoices}"
                                th:value="${voice}"
                                th:text="${voice}"
                                th:selected="${voice == entry.value}"></option>
                    </select>
                </label>
            </div>

            <button type="submit">Generate and download MP3</button>
        </form>
    </section>
</div>
</body>
</html>
