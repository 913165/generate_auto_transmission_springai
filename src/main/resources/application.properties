spring.application.name=generate_audio_transcription_V2

# Set via environment variable OPENAI_API_KEY or directly in this property.
spring.ai.openai.api-key=${OPENAI_API_KEY:}

# Disable default model auto-beans; this project uses OpenAiSpeechSynthesisClient directly.
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.model.chat=none
spring.ai.model.embedding=none
spring.ai.model.image=none
spring.ai.model.moderation=none

# Script source can be classpath:... or file:... path.
app.scripts.path=classpath:samle_scripts.txt

# ffmpeg merge settings. If ffmpeg is unavailable, fallback concatenation is used.
app.audio.ffmpeg.enabled=true
app.audio.ffmpeg.path=ffmpeg

# OpenAI speech endpoint used by the server-side TTS client.
app.openai.speech-url=https://api.openai.com/v1/audio/speech

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
